<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32dev.github.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Consolas';
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            position: relative;
        }

        .Box {
            width: 700px;
            height: 350px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        a:link, a:visited, a::before, a::after{
            color:white;
        }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

    <div id="root"></div>
    <!-- Your custom script here -->
</body>

<script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    function Title() {
        return (
            <div>
                <h2>CSH </h2>
                <hr />
            </div>
        );
    }
    function Menu(props) {
        return (
            <div class='Menu'>
                <p align="right"><a href={props.link}>{props.title}</a></p>
            </div>
        );
    }
    function MenuList() {
        return (
            <div>
                <Menu title="Youtube" link="https://youtube.com/@32comma/" />
                <Menu title="Blog" link="https://blog.naver.com/32dev/" />
                <Menu title="Github" link="https://github.com/32dev/" />
                <Menu title="Music" link="https://32dev.github.io/music/" />
                <Menu title="QwertyPiano" link="https://32dev.github.io/qwerty-piano/" />
            </div>
        );
    }
    function Box() {
        return (
            <div class="Box">

                <Title />
                <hr />
                <MenuList />
            </div>
        );
    }

    root.render(<Box />);
</script>

</html>
